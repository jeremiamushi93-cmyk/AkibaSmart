<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AkibaSmart – Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0F1C;
      color: white;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { width: 100%; max-width: 420px; padding: 20px; }
    .logo-area { text-align: center; margin-bottom: 36px; }
    .logo-area h1 { font-size: 2rem; font-weight: 800; color: #0FB9B1; letter-spacing: 1px; }
    .logo-area p { color: #8899AA; font-size: 0.9rem; margin-top: 6px; }
    .card {
      background: #121A2A;
      border: 1px solid #1E2D42;
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .card h2 { font-size: 1.4rem; margin-bottom: 24px; color: #E0EAF4; }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.82rem;
      color: #8899AA;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: #0A0F1C;
      border: 1px solid #1E2D42;
      border-radius: 12px;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #0FB9B1; }
    button {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #0FB9B1, #0A8F89);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .error {
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.3);
      color: #FF6B6B;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.87rem;
      margin-bottom: 18px;
    }
    .footer-link { text-align: center; margin-top: 22px; font-size: 0.88rem; color: #8899AA; }
    .footer-link a { color: #0FB9B1; text-decoration: none; font-weight: 600; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-area">
      <h1>💰 AkibaSmart</h1>
      <p>Your Smart Finance Manager</p>
    </div>
    <div class="card">
      <h2>Welcome Back</h2>
      {% if error %}
        <div class="error">⚠️ {{ error }}</div>
      {% endif %}
      <form method="post">
        <div class="form-group">
          <label>Username</label>
          <input name="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input name="password" type="password" placeholder="Enter your password" required>
        </div>
        <button type="submit">Login →</button>
      </form>
    </div>
    <div class="footer-link">
      Don't have an account? <a href="/register">Register here</a>
    </div>
  </div>
</body>
</html>
